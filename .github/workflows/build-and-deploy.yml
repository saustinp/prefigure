name: Build and deploy to github pages

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["*"]

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        name: Build and Test
        runs-on: ubuntu-latest
        env:
            CI: false

        strategy:
            matrix:
                node-version: [20.x]

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
                  cache-dependency-path: ./website/package-lock.json

            - name: Install cairo deps
              run: |
                  sudo apt-get update
                  sudo apt-get install libcairo2-dev

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install Python package
              run: |
                  pip install shapely lxml click networkx scipy numpy pycairo click-log

            - name: Run website tests
              run: |
                  cd website/
                  npm ci
                  npm run test

            - name: Build website
              run: |
                  cd website/
                  npm ci
                  cd ./packages/playground
                  npm run build

            - name: Prepare for Github Pages
              run: |
                  mkdir -p ./website_dist
                  cp -r ./website/packages/playground/dist/* ./website_dist
                  echo "These are the files that will be packaged"
                  ls ./website_dist

            - name: Package website deployment
              uses: actions/upload-pages-artifact@v3
              id: website_dist
              with:
                  path: ./website_dist

    deploy:
        if: ${{ github.event_name == 'push' }}
        environment:
            name: github-pages
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: website_dist
              uses: actions/deploy-pages@v4
